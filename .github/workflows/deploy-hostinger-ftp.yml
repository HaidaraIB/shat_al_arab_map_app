# Deploy built static files to Hostinger over FTP.
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER             — Hostinger FTP hostname (e.g. ftp.yourdomain.com from hPanel → Files → FTP Accounts)
#   FTP_USERNAME           — FTP user
#   FTP_PASSWORD           — FTP password
#   VITE_MAP_SAVE_TOKEN    — Same value as MAP_SAVE_TOKEN on Hostinger (or the token in save-map-default.php).
#                            Required for the “save default map” button on production; embedded at build time.
#
# Optional repository variables (Settings → Variables → Actions):
#   VITE_MAP_DISABLE_LOCAL_STORAGE — set to `true` if you want file-only map persistence (no localStorage).
#
# If Hostinger requires FTPS or a non-default port, add under "with:" on the deploy step, for example:
#   protocol: ftps
#   port: 21
#
# Adjust server-dir below if your site lives in a subdomain folder (e.g. /public_html/subdomain).

name: Deploy to Hostinger (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        env:
          VITE_MAP_SAVE_TOKEN: ${{ secrets.VITE_MAP_SAVE_TOKEN }}
          VITE_MAP_DISABLE_LOCAL_STORAGE: ${{ vars.VITE_MAP_DISABLE_LOCAL_STORAGE }}
        run: |
          npm ci
          npm run build

      # dist/ includes index.html, assets/, and map-default.json (copied from public/ by Vite — site root URL /map-default.json).
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          # Exclude secrets or large local-only files if you ever upload from repo root:
          # exclude: |
          #   **/.git*
          #   **/.git*/**
