# Deploy Supabase migrations and the built static frontend to Hostinger over FTP.
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER              — Hostinger FTP hostname (e.g. ftp.yourdomain.com from hPanel → Files → FTP Accounts)
#   FTP_USERNAME            — FTP user
#   FTP_PASSWORD            — FTP password
#
#   VITE_SUPABASE_URL       — Your Supabase project URL (https://<ref>.supabase.co). Embedded at build time.
#   VITE_SUPABASE_ANON_KEY  — Your Supabase anon/public key. Embedded at build time.
#
#   SUPABASE_ACCESS_TOKEN   — Personal access token from https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF    — Your project ref (the <ref> part of <ref>.supabase.co)
#   SUPABASE_DB_PASSWORD    — Database password from Project Settings → Database
#
# If Hostinger requires FTPS or a non-default port, add under "with:" on the deploy step, for example:
#   protocol: ftps
#   port: 21
#
# Adjust server-dir below if your site lives in a subdomain folder (e.g. /public_html/subdomain).

name: Deploy (Supabase + Hostinger FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: "Skip running supabase db push (deploy frontend only)"
        type: boolean
        default: false

jobs:
  db-migrate:
    name: Push Supabase migrations
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_migrations }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        run: supabase db push

  deploy:
    name: Build and deploy to Hostinger
    runs-on: ubuntu-latest
    needs: db-migrate
    # Run deploy even when db-migrate was skipped (e.g. workflow_dispatch with skip_migrations=true).
    if: ${{ always() && (needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npm run build

      # dist/ contains the SPA (index.html + assets/ + map-default.json seed).
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /
          # Exclude secrets or large local-only files if you ever upload from repo root:
          # exclude: |
          #   **/.git*
          #   **/.git*/**
